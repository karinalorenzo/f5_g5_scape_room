<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EL LABERINTO</title>

    <meta
      name="description"
      content="Escape Room - A thrilling adventure game."
    />

    <link
      rel="icon"
      href="/assets/img/icons/dungeon.svg"
      type="image/svg+xml"
    />

    <!-- Normalización y tipografías -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Lato:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- CSS del proyecto -->
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/internal.css" />
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/header.css" />
    <link rel="stylesheet" href="/css/home.css" />
    <link rel="stylesheet" href="/css/start.css" />
    <link rel="stylesheet" href="/css/room1.css" />
    <link rel="stylesheet" href="/css/footer.css" />
  </head>

  <body class="start-page">
    <audio id="bg-audio" autoplay loop>
      <!-- <source src="../assets/sound/dungeon_out.ogg" type="audio/ogg" /> -->
    </audio>

    <main class="start-content">
      <div id="body" class="start-hero light">
        <a href="failure.html">
          <img
            src="/assets/img/icons/dungeon.svg"
            class="start-logo"
            id="logo"
            alt="Logo"
          />
        </a>

        <div id="room1" class="room1">
          <div>
            <button class="btn_img" id="btn_key3">
              <img src="/assets/img/room_1/llave_3.png" />
            </button>
          </div>

          <div></div>

          <div>
            <button class="btn_img" id="btn_key2">
              <img src="/assets/img/room_1/llave_2.png" />
            </button>
          </div>

          <div>
            <button class="btn_img" id="turnOnButton">
              <img id="imgOnOff" class="cristalOn" src="" />
            </button>
          </div>

          <div id="cerradura">
            <div id="contenedor-mensajes" style="width: 100%; height: 100%">
              <h1 class="internal-title hide" id="dungeon-name">
                En los <br />momentos oscuros
              </h1>

              <p class="messageCard hide" id="help">
                Cuando la oscuridad sea total, la luz será tu llave. Síguela, y
                las puertas se rendirán ante ti.
              </p>

              <p class="messageCard hide" id="nollave">No ocurre nada</p>
              <p class="messageCard hide" id="sillave">
                Suena la cerradura y se abre la puerta
              </p>
            </div>
          </div>

          <div>
            <button class="btn_img" id="btn_key1">
              <img src="/assets/img/room_1/llave_1.png" />
            </button>
          </div>

          <div>
            <button class="btn_img" id="skullButton">
              <img src="/assets/img/room_1/skull.png" />
            </button>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="footer-left">
        <a
          href="https://github.com/karinalorenzo"
          target="_blank"
          class="icon-link"
        >
          <img
            src="/assets/img/icons/mdi_github-1.png"
            alt="GitHub Karina"
            class="icon"
          />
        </a>
        <a
          href="https://github.com/danielPalmera"
          target="_blank"
          class="icon-link"
        >
          <img src="/assets/img/gato.png" alt="GitHub Daniel" class="icon" />
        </a>
      </div>

      <div class="footer-right">Todos los derechos reservados | 2026</div>
    </footer>

    <script src="/js/room1.js"></script>
  </body>
</html>
