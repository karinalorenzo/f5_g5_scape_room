<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EL LABERINTO</title>

    <meta
      name="description"
      content="Escape Room - A thrilling adventure game."
    />
    
    <link rel="icon" href="/assets/img/icons/dungeon.svg" type="image/svg+xml" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Lato:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/internal.css" />
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/header.css" />
    <link rel="stylesheet" href="/css/home.css" />
    <link rel="stylesheet" href="/css/start.css" />
    <link rel="stylesheet" href="/css/room3.css" />
    <link rel="stylesheet" href="/css/footer.css" />
  </head>

  <body class="start-page">
    <audio id="bg-audio" autoplay loop>
      <!--<source src="../assets/sound/dungeon_out.ogg" type="audio/ogg"/>-->
    </audio>

    <!-- MAIN -->
    <main class="start-content">
      <div id="body" class="start-hero">

        <!-- LOGO -->
        <a href="failure.html">
          <img
            src="/assets/img/icons/dungeon.svg"
            class="start-logo"
            id="logo"
            alt="Logo"
          />
        </a>

        
          

        <!-- GOLEM -->
        <div id="contenedorCaras">
        <!-- TÍTULO -->
          <h1 class="internal-title hide" id="dungeon-name">
            El acertijo<br />
            del golem
          </h1>

        <!-- MENSAJES -->

          <div id="reacciones" class="hide">
            <p class="messageCard" id="mensaje"></p>
          </div>
          
        <!-- BOTONES DEL ACERTIJO (RESPUESTAS) -->
        <div id="acciones" class="hide">
          <div class="acciones">
            <button class="btn-start" id="accion_1"></button>
            <button class="btn-start" id="accion_2"></button>
            <button class="btn-start" id="accion_3"></button>
          </div>
        </div>

          <button id="face_1" class="btn_img">
            <img src="/assets/img/room_3/golem.png" />
          </button>
        </div>

      </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="footer-left">
        <a
          href="https://github.com/karinalorenzo"
          target="_blank"
          class="icon-link"
        >
          <img
            src="/assets/img/icons/mdi_github-1.png"
            alt="GitHub Karina"
            class="icon"
          />
        </a>
        <a
          href="https://github.com/danielPalmera"
          target="_blank"
          class="icon-link"
        >
          <img src="/assets/img/gato.png" alt="GitHub Daniel" class="icon" />
        </a>
      </div>
      <div class="footer-right">Todos los derechos reservados | 2026</div>
    </footer>

    <!-- SCRIPT DEL RETO -->
    <script src="/js/room3.js"></script>
    <div id="timer"><span id="timer-display"></span></div>
    <script src="/js/timer.js"></script>
  </body>
</html>
